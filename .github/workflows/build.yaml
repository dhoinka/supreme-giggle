name: build

on:
  push:
    branches: [ main ]

env:
  REGISTRY: us-central1-docker.pkg.dev
  ARTIFACT_REGISTRY_REPOSITORY: supreme-giggle
  IMAGE_NAME: supreme-giggle

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker authentication
        run: |
          gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build and test with Gradle
        run: |
          chmod +x gradlew
          ./gradlew build

      - name: Build, tag, and push image to Artifact Registry
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          REGISTRY: ${{ env.REGISTRY }}
          ARTIFACT_REGISTRY_REPOSITORY: ${{ env.ARTIFACT_REGISTRY_REPOSITORY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          IMAGE_URI="${REGISTRY}/${GCP_PROJECT_ID}/${ARTIFACT_REGISTRY_REPOSITORY}/${IMAGE_NAME}:${GITHUB_SHA}"
          ./gradlew bootBuildImage --imageName="${IMAGE_URI}" --publishImage
